<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Culina</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
    <nav>
        <div class="nav-logo"><a href="index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:1rem"><h1>CULINA</h1><div class="nav-logo-box"></div></a></div>
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
            <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
        </button>
        <div class="nav-search">
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="SEARCH RECIPES..." class="search-input" onkeydown="if(event.key==='Enter')window.location='recipes.html'" />
            </div>
        </div>
        <div class="nav-cta"><button class="nav-btn active" onclick="window.location='signin.html'">Join Club</button></div>
    </nav>
    <div class="nav-drawer" id="nav-drawer" aria-hidden="true">
        <div class="nav-drawer-overlay" id="nav-drawer-overlay"></div>
        <div class="nav-drawer-panel">
            <button class="drawer-close-btn" id="drawer-close-btn">✕</button>
            <nav class="drawer-links">
                <a href="index.html" class="drawer-link">Home</a>
                <a href="about.html" class="drawer-link">About Us</a>
                <a href="recipes.html" class="drawer-link">Recipe Collection</a>
                <a href="cookbook.html" class="drawer-link">Cookbook</a>
                <a href="contact.html" class="drawer-link">Contact Us</a>
                <a href="culinary-resources.html" class="drawer-link">Culinary Resources</a>
                <a href="resources.html" class="drawer-link">Resources</a>
            </nav>
        </div>
    </div>
    <main style="display:flex;justify-content:center;align-items:center;min-height:70vh;">
        <form class="contact-form" style="max-width:400px;width:100%;background:#fff;padding:2.5rem 2rem;border:2px solid #000;box-shadow:8px 8px 0 #000;">
            <h2 style="font-family:var(--font-display);font-size:2rem;font-weight:800;text-transform:uppercase;margin-bottom:2rem;text-align:center;">Sign In</h2>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="your@email.com" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Password" />
            </div>
            <button type="submit" class="brutal-btn" style="width:100%;justify-content:center;margin-top:1rem">Sign In</button>
            <p id="signin-success" style="display:none;margin-top:1rem;font-family:var(--font-mono);color:green;font-size:0.85rem;text-transform:uppercase;text-align:center">✓ Signed in! (Demo only)</p>
        </form>
    </main>
    <footer>
        <div class="footer-grid">
            <div>
                <h2 class="footer-title">STAY<br>HUNGRY</h2>
                <p class="footer-copyright">© 2026 Culina Brutalism. All rights reserved.</p>
            </div>
            <div class="footer-links">
                <a href="#" class="footer-link">Instagram</a>
                <a href="#" class="footer-link">Twitter</a>
                <a href="#" class="footer-link">Newsletter</a>
                <a href="contact.html" class="footer-link">Contact</a>
            </div>
        </div>
    </footer>
</div>
<script>
    // Hamburger drawer logic (same as other pages)
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const navDrawer = document.getElementById('nav-drawer');
    const drawerOverlay = document.getElementById('nav-drawer-overlay');
    const drawerCloseBtn = document.getElementById('drawer-close-btn');
    function openDrawer() { navDrawer.classList.add('is-open'); hamburgerBtn.classList.add('is-open'); document.body.style.overflow='hidden'; }
    function closeDrawer() { navDrawer.classList.remove('is-open'); hamburgerBtn.classList.remove('is-open'); document.body.style.overflow=''; }
    hamburgerBtn.addEventListener('click', () => navDrawer.classList.contains('is-open') ? closeDrawer() : openDrawer());
    drawerCloseBtn.addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);
    document.querySelectorAll('.drawer-link').forEach(l => l.addEventListener('click', closeDrawer));
    // Demo sign-in handler
    document.querySelector('form').addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('signin-success').style.display = 'block';
        e.target.reset();
    });
</script>
</body>
</html>
